<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Horizon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Event Horizon</h1>
    <p>Manage your upcoming events</p>
  </header>

  <!-- MAIN -->
  <main>

    <!-- ADD EVENT FORM -->
    <section class="form-section">
      <h2>Add New Event</h2>

      <div id="warning-msg" class="warning hidden">
        Please fill in all fields before adding an event.
      </div>

      <div class="form-group">
        <label for="event-name">Event Name *</label>
        <input type="text" id="event-name" placeholder="e.g. Tech Summit 2025" />
      </div>

      <div class="form-group">
        <label for="event-date">Event Date *</label>
        <input type="date" id="event-date" />
      </div>

      <div class="form-group">
        <label for="event-desc">Event Description *</label>
        <textarea id="event-desc" rows="3" placeholder="Describe the event..."></textarea>
      </div>

      <button id="add-btn" onclick="addEvent()">+ Add Event</button>
    </section>

    <!-- EVENTS LIST -->
    <section class="events-section">
      <div class="events-top">
        <h2>Upcoming Events</h2>
        <input type="search" id="search-input" placeholder="Search by name or date..." oninput="renderEvents()" />
      </div>

      <div class="legend">
        <span class="dot purple"></span> Upcoming &nbsp;&nbsp;
        <span class="dot gray"></span> Past
      </div>

      <div id="events-container"></div>
      <p id="no-results" class="hidden">No events found.</p>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>Abdullah &nbsp;|&nbsp; <span id="footer-year"></span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
